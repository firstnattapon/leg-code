# Copy these sections into Streamlit Community Cloud > App settings > Secrets.
# Never rename this file to secrets.toml and commit real credentials.

[firebase_service_account]
type = "service_account"
project_id = "YOUR_GCP_PROJECT_ID"
private_key_id = "YOUR_PRIVATE_KEY_ID"
private_key = "-----BEGIN PRIVATE KEY-----\nYOUR_PRIVATE_KEY\n-----END PRIVATE KEY-----\n"
client_email = "YOUR_SERVICE_ACCOUNT@YOUR_GCP_PROJECT_ID.iam.gserviceaccount.com"
client_id = "YOUR_CLIENT_ID"
auth_uri = "https://accounts.google.com/o/oauth2/auth"
token_uri = "https://oauth2.googleapis.com/token"
auth_provider_x509_cert_url = "https://www.googleapis.com/oauth2/v1/certs"
client_x509_cert_url = "YOUR_CLIENT_CERT_URL"
universe_domain = "googleapis.com"

[lego_dashboard]
# One-new-row chain configuration.  Changing fix_c, diff, dna_code, or
# decimal_precision starts a NEW chain namespace (a new webull_lego_state key),
# because they change how every column is calculated.
fix_c = 1500.0
diff = 0.0
dna_code = "bypass:100"
decimal_precision = 5
order_audit_collection = "webull_lego_order_audit"
# The one-new-row pipeline never reads the shannon_demon_trades log; Step 18
# writes the final row and its state pointer transactionally to
# webull_lego_rows / webull_lego_state.  Order Preview/Submit audit is kept in
# session and downloadable at Tab 18.  Set true ONLY if the service account has
# write permission on the order-audit collection.
audit_to_firestore = false
